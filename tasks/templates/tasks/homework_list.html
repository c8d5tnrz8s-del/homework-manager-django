<!DOCTYPE html>
<html>
<head>
    <title>Homework Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h1 class="mb-4">
        System zarządzania zadaniami domowymi
    </h1>

<form method="get" class="mb-3">

    <div class="row">

        <div class="col-md-8">

            <input
                type="text"
                name="q"
                class="form-control"
                placeholder="Wyszukaj zadanie po opisie">

        </div>

        <div class="col-md-4">

            <button
                type="submit"
                class="btn btn-dark">

                Szukaj

            </button>

        </div>

    </div>

</form>

    <a href="/add/" class="btn btn-primary mb-3">
        Dodaj nowe zadanie
    </a>

    <table class="table table-striped table-bordered">

        <thead>
            <tr>
                <th>Opis</th>
                <th>Termin</th>
                <th>Status</th>
                <th>Przedmiot</th>
                <th>Uczeń</th>
                <th>Akcje</th>
            </tr>
        </thead>

        <tbody>

        {% for homework in homeworks %}
            <tr>
                <td>{{ homework.description }}</td>
                <td>{{ homework.due_date }}</td>
                <td>{{ homework.get_status_display }}</td>
                <td>{{ homework.subject }}</td>
                <td>{{ homework.student }}</td>

                <td>
                    <a href="/edit/{{ homework.id }}/"
                       class="btn btn-warning btn-sm">
                        Edytuj
                    </a>

                    <a href="/delete/{{ homework.id }}/"
                       class="btn btn-danger btn-sm">
                        Usuń
                    </a>
                </td>
            </tr>
        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
