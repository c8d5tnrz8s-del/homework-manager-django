<!DOCTYPE html>
<html>
<head>
    <title>Dodaj zadanie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h1>Formularz zadania</h1>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
                class="btn btn-success">
            Zapisz
        </button>

        <a href="/"
           class="btn btn-secondary">
            Powrót
        </a>

    </form>

</div>

</body>
</html>
